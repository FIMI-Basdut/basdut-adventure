<div id="deleteVenueModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    
    <div class="bg-white rounded-xl w-full max-w-[400px] p-6 shadow-xl relative transform transition-all">
        
        <button onclick="hideDeleteVenueModal()" class="absolute top-5 right-5 text-gray-400 hover:text-gray-600 transition-colors">
            <i class="fas fa-times text-lg"></i>
        </button>

        <h3 class="text-xl font-bold text-red-600 mb-3">Hapus Venue</h3>
        
        <p class="text-sm text-gray-500 mb-8 pr-2 leading-relaxed">
            Apakah Anda yakin ingin menghapus venue ini? Tindakan ini tidak dapat dibatalkan.
        </p>
        
        <div class="flex justify-end gap-3 mt-2">
            <button onclick="hideDeleteVenueModal()" class="px-5 py-2.5 rounded-lg border border-gray-200 text-sm font-semibold text-gray-700 hover:bg-gray-50 transition-colors">
                Batal
            </button>
            <button class="bg-[#e11d48] hover:bg-red-700 text-white px-5 py-2.5 rounded-lg text-sm font-semibold transition-colors">
                Hapus
            </button>
        </div>
    </div>
</div>

<!-- SCRIPT buat beneran hapusnya belum ada -->
<script>
    function showDeleteVenueModal() {
        const modal = document.getElementById('deleteVenueModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function hideDeleteVenueModal() {
        const modal = document.getElementById('deleteVenueModal');
        modal.classList.remove('flex');
        modal.classList.add('hidden');
    }
</script>
