<!-- Modal -->
<div id="updateVenueModal" class="hidden fixed inset-0 z-50 w-full flex items-center justify-center bg-gray-800 bg-opacity-50">
  <div id="updateVenueModalContent" class="bg-white rounded-lg shadow-lg w-5/6 sm:w-3/5 md:w-1/2 lg:w-2/5 xl:w-1/3 max-h-screen overflow-y-auto">
    <!-- Modal header -->
    <div class="flex items-center justify-between p-4 border-b">
      <div>
        <h3 class="text-xl font-semibold text-gray-900">
          Edit Venue
        </h3>
        <p class="text-sm text-gray-600 mt-1">Sesuaikan informasi milik venue ini</p>
      </div>
      <button type="button" class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm p-1.5 ml-auto inline-flex items-center" onclick="hideUpdateVenueModal()">
        <svg aria-hidden="true" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
        </svg>
        <span class="sr-only">Close modal</span>
      </button>
    </div>
    <!-- Modal body -->
    <div class="px-6 py-4 space-y-6 form-style">
      <form id="venueForm">
        <div class="mb-4">
          <label for="venue_name" class="block text-sm font-medium text-gray-700">NAMA VENUE (VENUE_NAME)</label>
          <input type="text" id="venue_name" name="venue_name" class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 transition-colors hover:border-blue-700 focus:outline-none focus:border-blue-700 focus:ring-1 focus:ring-blue-700" placeholder="contoh: Jakarta Convention Center" required>
        </div>
        
        <div class="mb-4">
          <label for="capacity" class="block text-sm font-medium text-gray-700">KAPASITAS (CAPACITY)</label>
          <input type="number" id="capacity" name="capacity" class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 transition-colors hover:border-blue-700 focus:outline-none focus:border-blue-700 focus:ring-1 focus:ring-blue-700" placeholder="0">
        </div>

        <div class="mb-4">
          <label for="city" class="block text-sm font-medium text-gray-700">KOTA (CITY)</label>
          <input type="url" id="city" name="city" class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 transition-colors hover:border-blue-700 focus:outline-none focus:border-blue-700 focus:ring-1 focus:ring-blue-700" placeholder="Jakarta">
        </div>

        <div class="mb-4">
          <label for="address" class="block text-sm font-medium text-gray-700">ALAMAT (ADDRESS)</label>
          <textarea id="address" name="address" rows="3" class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 transition-colors hover:border-blue-700 focus:outline-none focus:border-blue-700 focus:ring-1 focus:ring-blue-700" placeholder="Jl. Gatot Subroto No. 1" required></textarea>
        </div>

        <div class="mb-4">
          <div class="flex items-center">
            <input id="has_reserved_seating" name="has_reserved_seating" type="checkbox" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded">
            <label for="has_reserved_seating" class="ml-2 text-sm font-medium text-gray-900">Has Reserved Seating</label>
          </div>
        </div>
      </form>
    </div>
    <!-- Modal footer -->
    <div class="flex flex-col sm:flex-row gap-4 p-6 border-t border-gray-200 rounded-b">
      <button type="button" id="cancelButton" class="order-2 sm:order-1 px-6 py-3 border border-gray-300 text-gray-700 rounded-md font-medium hover:bg-gray-50 transition-colors text-center" onclick="hideUpdateVenueModal()">Cancel</button>
      <button type="submit" id="submitVenue" form="venueForm" class="order-1 sm:order-2 flex-1 bg-blue-600 text-white px-6 py-3 rounded-md font-medium hover:bg-blue-700 transition-colors">Tambah</button>
    </div>
  </div>
</div>

<!-- SCRIPT sama HTML nya masih ngikutin create venue, belum diesesuaiin untuk edit-->
<!-- referensi modal edit bisa lihat di tugas kelompok pbp-->
<script>
  function showUpdateVenueModal() {
      const modal = document.getElementById('updateVenueModal');
      const modalContent = document.getElementById('updateVenueModalContent');

      modal.classList.remove('hidden'); 
      setTimeout(() => {
        modalContent.classList.remove('opacity-0', 'scale-95');
        modalContent.classList.add('opacity-100', 'scale-100');
      }, 50); 
  }

  function hideUpdateVenueModal() {
      const modal = document.getElementById('updateVenueModal');
      const modalContent = document.getElementById('updateVenueModalContent');

      modalContent.classList.remove('opacity-100', 'scale-100');
      modalContent.classList.add('opacity-0', 'scale-95');

      setTimeout(() => {
        modal.classList.add('hidden');
      }, 150); 
  }

  async function addVenueEntry() {
    await fetch("{% url 'venue:venue_list' %}", {
      method: "POST",
      body: new FormData(document.querySelector('#venueForm')),
    })

    document.getElementById("venueForm").reset();
    hideUpdateVenueModal();
      
    // Show toast notification
    showToast('Venue added successfully!', '', 'success');

    // Dispatch custom event to notify main.html about new data
    document.dispatchEvent(new CustomEvent('venueAdded'));

    return false;
  }

  document.getElementById("venueForm").addEventListener("submit", function(e) {
    e.preventDefault();
    addVenueEntry();
  })
</script>
