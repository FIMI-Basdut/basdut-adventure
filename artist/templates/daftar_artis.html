<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Artis - TikTakTuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-slate-800">

    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">Daftar Artis</h1>
                <p class="text-sm text-slate-500 mt-1">Kelola artis yang ada di platform TikTakTuk</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Total Artis</p>
                <h2 class="text-3xl font-bold text-slate-800">6</h2>
            </div>
            <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Genre</p>
                <h2 class="text-3xl font-bold text-slate-800">6</h2>
            </div>
            <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Tampil di Event</p>
                <h2 class="text-3xl font-bold text-slate-800">6</h2>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
            
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-800">Tabel Artis</h2>
                <div class="flex bg-gray-100 p-1 rounded-lg">
                    <button class="bg-white shadow-sm px-4 py-1.5 rounded-md text-sm font-bold text-green-700">Tabel</button>
                    <button class="px-4 py-1.5 rounded-md text-sm font-medium text-slate-500 hover:text-slate-700 transition">Daftar</button>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                <div class="relative w-full max-w-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-lg text-sm placeholder-gray-400 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition" placeholder="Cari nama atau genre...">
                </div>
                <span class="text-sm text-slate-500">6 artis ditemukan</span>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-max">
                    <thead>
                        <tr class="bg-gray-50/50">
                            <th class="py-3 px-4 text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-gray-100">Artis</th>
                            <th class="py-3 px-4 text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-gray-100">Genre</th>
                            <th class="py-3 px-4 text-right border-b border-gray-100"></th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        
                        <tr class="hover:bg-gray-50 transition group">
                            <td class="py-4 px-4 flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-lg">
                                    F
                                </div>
                                <span class="font-bold text-slate-800">Fourtwnty</span>
                            </td>
                            <td class="py-4 px-4">
                                <span class="bg-green-100 text-green-700 px-3 py-1 rounded-md text-[11px] font-bold uppercase tracking-wider">Indie Folk</span>
                            </td>
                            <td class="py-4 px-4 text-right">
                            </td>
                        </tr>

                        <tr class="hover:bg-gray-50 transition group">
                            <td class="py-4 px-4 flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-lg">
                                    H
                                </div>
                                <span class="font-bold text-slate-800">Hindia</span>
                            </td>
                            <td class="py-4 px-4">
                                <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-md text-[11px] font-bold uppercase tracking-wider">Indie Pop</span>
                            </td>
                            <td class="py-4 px-4 text-right">
                            </td>
                        </tr>
                        <tr class="hover:bg-gray-50 transition group">
                            <td class="py-4 px-4 flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-lg">
                                    T
                                </div>
                                <span class="font-bold text-slate-800">Tulus</span>
                            </td>
                            <td class="py-4 px-4">
                                <span class="bg-red-100 text-red-700 px-3 py-1 rounded-md text-[11px] font-bold uppercase tracking-wider">Pop</span>
                            </td>
                            <td class="py-4 px-4 text-right">
                            </td>
                        </tr>
                        <tr class="hover:bg-gray-50 transition group">
                            <td class="py-4 px-4 flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-lg">
                                    N
                                </div>
                                <span class="font-bold text-slate-800">Nadin Amizah</span>
                            </td>
                            <td class="py-4 px-4">
                                <span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-md text-[11px] font-bold uppercase tracking-wider">Folk</span>
                            </td>
                            <td class="py-4 px-4 text-right">
                            </td>
                        </tr>
                        <tr class="hover:bg-gray-50 transition group">
                            <td class="py-4 px-4 flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-lg">
                                    P
                                </div>
                                <span class="font-bold text-slate-800">Pamungkas</span>
                            </td>
                            <td class="py-4 px-4">
                                <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-md text-[11px] font-bold uppercase tracking-wider">SINGER-SONGWRITER</span>
                            </td>
                            <td class="py-4 px-4 text-right">
                            </td>
                        </tr>
                        <tr class="hover:bg-gray-50 transition group">
                            <td class="py-4 px-4 flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-lg">
                                    R
                                </div>
                                <span class="font-bold text-slate-800">Raisa</span>
                            </td>
                            <td class="py-4 px-4">
                                <span class="bg-red-100 text-red-700 px-3 py-1 rounded-md text-[11px] font-bold uppercase tracking-wider">R&B/POP</span>
                            </td>
                            <td class="py-4 px-4 text-right">
                            </td>
                        </tr>
                        </tbody>
                </table>
            </div>
        </div>

    </main>

</body>
</html>
